name: flye
description: |
  Flye is a de novo assembler for single-molecule sequencing reads.

  You may find additional information on `Flye's <https://github.com/mikolmogorov/Flye>`_ github page.
url: https://github.com/mikolmogorov/Flye
authors:
  - Artur Gomes
input:
  - reads: Long reads (FASTQ/FASTA, can be gzipped)
output:
  - contigs: Assembled contigs (FASTA)
  - dir: Output directory containing assembly files
params:
  seq_type: |
    Sequencing type. Valid options: nano-raw, nano-corr, nano-hq, pacbio-raw, pacbio-corr, pacbio-hifi.
  meta: Enable metagenome mode (boolean)
  keep_haplotypes: Keep alternative haplotypes (boolean)
  no_alt_contigs: Disable alternative contigs output (boolean)
  scaffold: Enable scaffolding (boolean)
  extra: Additional program arguments
notes: |
  * Memory is automatically set from `resources.mem_mb` if available.
  * The `seq_type` parameter is required to specify the input read type.
