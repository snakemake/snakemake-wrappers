name: "kraken2"
description: Add sequences to a Kraken2 database library.
url: https://github.com/DerrickWood/kraken2
authors:
  - Alessandro Leone
notes: |
  * Adds one or more sequence files to a Kraken2 database library (`k2 add-to-library`).
  * Input sequences are typically FASTA (optionally compressed, depending on Kraken2 setup).
  * Requires a valid target database directory (`--db`) initialized for Kraken2.
  * This step updates library contents only; run the build step afterward to generate searchable DB indices.
  * Useful for incrementally extending custom databases before classification.